<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Watch</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/8.png" type="image/x-icon">
</head>

<body>

  <header>
    <span class="Logo">DEV-8</span>
  </header>

  <div class="styleWatch">
    <div class="time">
    </div>
  </div>

  <script>
    const updateTime = () => {
      const now = new Date();

      const hours = now.getHours().toString().padStart(2, "0");
      const minutes = now.getMinutes().toString().padStart(2, "0");
      const seconds = now.getSeconds().toString().padStart(2, "0");

      const elemento = document.querySelector(".time");
      elemento.textContent = `${hours} : ${minutes} : ${seconds}`;
    }

    setInterval(updateTime, 1000); // fora da função
    window.addEventListener("load", updateTime);
  </script>

</body>
</html>
